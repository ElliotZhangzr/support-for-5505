<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="../static/css/leaderboard.css">
</head>
<body>

<div class="container">
    <h1>🏆 Leaderboard</h1>

    <div class="buttons">
        <button class="active">Total Assets</button>
        <button>Cash</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>User</th>
                <th>Value ($)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>🥇 1</td>
                <td>Alice</td>
                <td>12,500</td>
            </tr>
            <tr>
                <td>🥈 2</td>
                <td>Bob</td>
                <td>11,800</td>
            </tr>
            <tr class="current-user">
                <td>🥉 3</td>
                <td>You</td>
                <td>10,950</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Charlie</td>
                <td>9,500</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
